<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能文本风格迁移助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Noto Sans SC', sans-serif;
        background-color: #f8fafc;
      }
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      .rich-editor-content ul { list-style-type: disc; padding-left: 1.5em; }
      .rich-editor-content ol { list-style-type: decimal; padding-left: 1.5em; }
      .rich-editor-content blockquote { border-left: 4px solid #e2e8f0; padding-left: 1em; color: #64748b; }
      .rich-editor-content h1 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; }
      .rich-editor-content h2 { font-size: 1.25em; font-weight: bold; margin-bottom: 0.5em; }
      .rich-editor-content p { margin-bottom: 0.5em; }
      [contenteditable][data-placeholder]:empty:before {
        content: attr(data-placeholder);
        color: #94a3b8;
        font-style: italic;
        cursor: text;
      }
    </style>
  <script type="importmap">
{

    "react": "https://esm.sh/react@^19.2.4",

    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</body>
</html>
